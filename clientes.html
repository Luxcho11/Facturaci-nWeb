<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <title>Clientes</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="clientes.html">Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="productos.html">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="crear-factura.html">Crear Factura</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="facturas.html">Facturas</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Manejo de clientes</h2>

        <!--Form-->
        <div class="form-card">
            <div class="row g-3">
                <div class="col-md-4">
                    <label for="cli-cedula" class="form-label">Cédula</label>
                    <input type="text" id="cli-cedula" class="form-control" placeholder="Ingrese cédula" />
                </div>
                <div class="col-md-5">
                    <label for="cli-nombre" class="form-label">Nombre</label>
                    <input type="text" id="cli-nombre" class="form-control" placeholder="Ingrese nombre" />
                </div>
                <div class="col-md-3 d-flex align-items-end gap-2">
                    <button id="btn-guardar-cliente" class="btn btn-primary" onclick="guardarCliente()">
                        <i class="bi bi-save"></i> Guardar
                    </button>
                    <button id="btn-cancelar-cliente" class="btn btn-secondary" onclick="limpiarFormCliente()">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </button>
                </div>
            </div>
            <div id="msg-clientes" class="mt-3"></div>
        </div>

        <div class="table-responsive">
            <table id="tabla-clientes" class="table table-bordered table-hover tabla-sistema">
                <thead>
                    <tr>
                        <th>Cédula</th>
                        <th>Nombre</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="database/data.js"></script>
    <script src="database/clientes.js"></script>
</body>

</html>
