<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <title>Facturas</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="clientes.html">Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="productos.html">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="crear-factura.html">Crear Factura</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="facturas.html">Facturas</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Manejo de facturas</h2>

        <div class="form-card">
            <div class="row g-3">
                <div class="col-md-3">
                    <label for="fact-cliente" class="form-label">Cliente</label>
                    <select id="fact-cliente" class="form-control">
                        <option value="">Seleccione un cliente</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="fact-producto" class="form-label">Producto</label>
                    <select id="fact-producto" class="form-control">
                        <option value="">Seleccione un producto</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="fact-cantidad" class="form-label">Cantidad</label>
                    <input type="number" id="fact-cantidad" class="form-control" placeholder="Cantidad" min="1" />
                </div>
                <div class="col-md-2">
                    <label for="fact-total" class="form-label">Total</label>
                    <input type="text" id="fact-total" class="form-control" readonly />
                </div>
                <div class="col-md-2 d-flex align-items-end gap-2">
                    <button id="btn-guardar-factura" class="btn btn-primary" onclick="guardarFactura()">
                        <i class="bi bi-save"></i> Guardar
                    </button>
                    <button id="btn-cancelar-factura" class="btn btn-secondary" onclick="limpiarFormFactura()">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </button>
                </div>
            </div>
            <div id="msg-facturas" class="mt-3"></div>
        </div>

        <div class="table-responsive">
            <table id="tabla-facturas" class="table table-bordered table-hover tabla-sistema">
                <thead>
                    <tr>
                        <th>Número</th>
                        <th>Cliente</th>
                        <th>Total</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="database/data.js"></script>
    <script src="database/facturas.js"></script>
</body>

</html>
